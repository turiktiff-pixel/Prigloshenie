<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Никах приглашение</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f7f5f0;
            font-family: sans-serif;
            text-align: center;
        }
        .wrapper {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }
        img {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 16px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <img src="img1.jpg" alt="Приглашение на никах часть 1">
    <img src="img2.jpg" alt="Приглашение на никах часть 2">
</div>
</body>
</html>
